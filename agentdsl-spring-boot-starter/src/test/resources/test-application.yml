# 测试用的 AgentDSL 配置
agentdsl:
  enabled: true
  scripts-location: classpath:agents/
  sandbox: false
  hot-reload: false
  model:
    provider: gemini
    model-name: gemini-2.0-flash
    temperature: 0.7
    max-tokens: 4096
  api:
    enabled: true
    base-path: /api

# 测试环境不需要真实的APIKey
logging:
  level:
    com.agentdsl: DEBUG